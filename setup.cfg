# Static analysis configuration (NPR 7150.2D SWE-135: use static analysis;
# SWE-134: adhere to a defined coding standard). Running `flake8` and `mypy`
# with this configuration is part of the verification gate (see pytest.ini
# and the CI workflow).

[flake8]
max-line-length = 110
# pyflakes (F), pycodestyle (E/W), and mccabe complexity (C) are all enabled.
max-complexity = 10
extend-ignore =
    # E203: whitespace before ':' (conflicts with common formatting).
    E203
exclude =
    .git,
    .venv,
    .python_packages,
    __pycache__,
    .pytest_cache

[mypy]
python_version = 3.11
ignore_missing_imports = True
warn_unused_ignores = True
warn_redundant_casts = True
warn_return_any = True
no_implicit_optional = True
